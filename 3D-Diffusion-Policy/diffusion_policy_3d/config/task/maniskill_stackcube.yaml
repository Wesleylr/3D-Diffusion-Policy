name: maniskill_stackcube

task_name: StackCube-v1

shape_meta: &shape_meta
  obs:
    point_cloud:
      shape: [1024, 6]
      type: point_cloud
    agent_pos:
      shape: [8]
      type: low_dim
  action:
    shape: [7]

env_runner:
  _target_: diffusion_policy_3d.env_runner.maniskill_runner.ManiSkillRunner
  eval_episodes: 20
  max_steps: 200
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  fps: 30
  n_envs: 1
  task_name: ${task_name}
  image_size: 128
  camera_name: base_camera
  obs_mode: pointcloud
  control_mode: pd_ee_delta_pose
  use_point_crop: ${policy.use_point_crop}
  num_points: 1024
  point_sample_method: fps
  render_mode: rgb_array
  use_pc_color: ${policy.use_pc_color}
  filter_table_workspace: false

dataset:
  _target_: diffusion_policy_3d.dataset.maniskill_dataset.ManiSkillDataset
  zarr_path: data_new/stackcube/motionplanning_base_camera.zarr
  state_key: robot_state
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: 150
  task_name: ${task_name}